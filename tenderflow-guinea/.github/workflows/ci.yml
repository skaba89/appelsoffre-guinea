name: TenderFlow Guinea CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Lint & Test ───────────────────────────────────
  backend:
    name: Backend (API)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenderflow
          POSTGRES_PASSWORD: tfsecret
          POSTGRES_DB: tenderflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check app/ --ignore=E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tenderflow:tfsecret@localhost:5432/tenderflow_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # ─── Frontend Lint & Build ─────────────────────────────────
  frontend:
    name: Frontend (Web)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Docker Build Check ────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t tenderflow-api:ci ./apps/api

      - name: Build Web image
        run: docker build -t tenderflow-web:ci ./apps/web

      - name: Build Worker image
        run: docker build -t tenderflow-worker:ci ./services/worker

  # ─── Integration Test ──────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d db redis minio
        env:
          POSTGRES_PASSWORD: tfsecret

      - name: Wait for services
        run: sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:5432 || echo "PostgreSQL not ready"
          docker compose exec db pg_isready -U tenderflow
